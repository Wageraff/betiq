<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetIQ Admin</title>
    
    <style rel="stylesheet">:root{--bg: #0f1419;--panel: #1a2332;--border: #2d3a4f;--text: #e7ecf3;--muted: #8b9bb4;--accent: #3b82f6;--ok: #22c55e;--warn: #f59e0b}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}a{color:var(--accent)}.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}.sidebar{background:var(--panel);border-right:1px solid var(--border);padding:1.25rem}.sidebar h1{font-size:1.1rem;margin:0 0 1.5rem}.sidebar nav a{display:block;padding:.5rem .75rem;border-radius:6px;color:var(--text);text-decoration:none;margin-bottom:.25rem}.sidebar nav a.active{background:var(--accent);color:#fff}.main{padding:1.5rem 2rem}.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}.filters{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:1rem}input,select,button,textarea{font:inherit}input,select,textarea{background:#0d1117;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.45rem .6rem}button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:.45rem .9rem;cursor:pointer}button.secondary{background:#334155}button:disabled{opacity:.5;cursor:not-allowed}table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{text-align:left;padding:.55rem .65rem;border-bottom:1px solid var(--border)}th{color:var(--muted);font-weight:600}.badge{display:inline-block;padding:.15rem .45rem;border-radius:4px;font-size:.75rem;background:#334155}.badge.ok{background:#14532d;color:var(--ok)}.badge.tier-high{background:#1e3a5f;color:#93c5fd}.badge.tier-medium{background:#334155}.badge.tier-low{background:#422006;color:var(--warn)}.health-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#475569}.health-dot.ok{background:var(--ok)}.health-dot.warn{background:var(--warn)}.health-dot.error{background:#ef4444}.health-dot.idle{background:#64748b}.source-row.health-error{background:#ef44440f}.source-row.health-warn{background:#f59e0b0f}.table-wrap{overflow-x:auto}.sources-table{font-size:.82rem}.sources-table .sub-stat{color:var(--muted);font-size:.72rem}.sources-table .error-num{color:#f87171}.sources-table .muted-num{color:var(--muted)}.sources-table .dt-cell{white-space:nowrap}.ai-table{font-size:.85rem}.ai-table .ai-pick-cell{white-space:nowrap;max-width:180px}.ai-table .ai-preview-cell{max-width:280px;color:var(--muted)}.ai-table .ai-actions-cell{white-space:nowrap}.ai-edit-row td{background:#0d1117;padding:1rem .65rem}.ai-edit-form{display:flex;flex-direction:column;gap:.75rem}.ai-edit-form label{display:block;font-size:.85rem;color:var(--muted)}.ai-edit-actions{display:flex;gap:.5rem}.error{color:#f87171;margin:.5rem 0}.log-box{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:.75rem;max-height:320px;overflow:auto;font-family:ui-monospace,monospace;font-size:.8rem;white-space:pre-wrap}.team-logo{width:40px;height:40px;object-fit:contain;border-radius:4px;background:#0d1117}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.match-meta{display:flex;flex-wrap:wrap;gap:.75rem 1.25rem;font-size:.9rem;color:var(--muted)}.prediction-card{margin-bottom:1rem}.prediction-head{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}.bet-list{margin:.5rem 0;padding-left:1.25rem}.bet-list li{margin-bottom:.25rem}.prediction-text{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:.75rem;overflow:auto;max-height:480px;font-size:.85rem;line-height:1.45;margin:.5rem 0 0;white-space:pre-wrap}.prediction-html{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:.75rem;overflow:auto;max-height:560px;font-size:.9rem;line-height:1.5;margin:.5rem 0 0}.prediction-html img{max-width:100%;height:auto}.dup-groups-head{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:1rem}.dup-groups h3{margin:0}.dup-group{border-top:1px solid var(--border);padding-top:.75rem;margin-top:.75rem}.dup-group-title{display:flex;align-items:baseline;gap:.75rem;margin-bottom:.5rem}.dup-group ul{list-style:none;margin:0 0 .5rem;padding:0}.dup-group li{margin-bottom:.35rem}.dup-group label{cursor:pointer}.dup-manual{border-top:1px solid var(--border);padding-top:.75rem}.api-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}.quota-bar{position:relative;height:24px;background:var(--bg);border-radius:6px;overflow:hidden;margin:.5rem 0}.quota-fill{height:100%;transition:width .3s}.quota-label{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600}.sync-actions{display:flex;flex-wrap:wrap;gap:.5rem}.compact-table{width:100%;font-size:.85rem}.compact-table td,.compact-table th{padding:.35rem .5rem}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0}.api-badges .badge{margin-right:.2rem}.row-significant{background:#f59e0b1f}.odds-panel{margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}.odds-panel-head{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:.5rem;margin-bottom:.75rem}.market-pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem;max-height:160px;overflow-y:auto}.market-pill{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem .55rem;border:1px solid var(--border);border-radius:999px;background:var(--bg);color:var(--text);font-size:.78rem;cursor:pointer}.market-pill:hover{border-color:var(--accent)}.market-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}.market-pill-count{opacity:.75;font-size:.72rem}.provider-tabs{display:flex;gap:.35rem;margin-bottom:.5rem}.provider-tabs button{padding:.3rem .65rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.8rem;cursor:pointer}.provider-tabs button.active{border-color:var(--accent);color:var(--accent)}.odds-table-wrap{overflow:auto;max-height:420px;border:1px solid var(--border);border-radius:6px}.job-log{max-height:240px;overflow:auto;font-size:.75rem;background:var(--bg);padding:.75rem;border-radius:6px;margin-top:.75rem}.muted{color:var(--muted)}@media (max-width: 900px){.layout,.grid-2,.api-grid,.form-grid{grid-template-columns:1fr}}</style>
  </head>
  <body>
    <div id="root"><p style="padding:2rem;color:#8b9bb4;font-family:system-ui,sans-serif">Loading…</p></div>
  <script>
(async function () {
  var root = document.getElementById("root");
  var code = "";
  try {
    for (var i = 0; i < 12; i++) {
      var r = await fetch("/admin/c/" + i + ".js");
      if (!r.ok) throw new Error("chunk " + i + ": " + r.status);
      code += await r.text();
    }
    var el = document.createElement("script");
    el.textContent = code;
    document.body.appendChild(el);
  } catch (e) {
    root.innerHTML = '<p style="padding:2rem;color:#f87171">Load error: ' + e + '</p>';
  }
})();
</script>
</body>
</html>
