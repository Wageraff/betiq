; ============================================================
;  BetIQ Parser — настройки (на основе bwb-parser)
; ============================================================

[urls]
input_file = urls.txt
failed_file = failed_urls.txt
diagnose_test_url = https://legalbet.ru/

[scraper]
require_proxy = true
concurrency = 1
min_delay = 4
max_delay = 9
max_attempts = 3
page_timeout = 60000
headless = true
viewport_width = 1920
viewport_height = 1080
; Минимум символов в content_html, иначе URL считается failed
min_content_length = 200

[selectors]
; Универсальные селекторы — уточни под каждый источник в config/sources/
content_block = article, .post-content, .entry-content, .article__content, main article
title_h1 = h1

[database]
path = data/pages.db

[api]
host = 0.0.0.0
port = 8001
auth_token = CHANGE_ME_BETIQ_API_TOKEN

[logging]
level = INFO
file = logs/parser.log
