; ============================================================
;  Sports Predictions Aggregator — настройки
; ============================================================

[scraper]
require_proxy = true
headless = true
page_timeout = 60000
viewport_width = 1366
viewport_height = 768
min_delay = 2.0
max_delay = 5.0
max_retries = 3
articles_max_age_days = 7
; Пауза при серии ERR_CONNECTION_* / банов прокси подряд
proxy_error_cooldown_sec = 60
proxy_error_burst = 5
; Кэш URL с разделов (мин): quick раз в час — TTL чуть меньше интервала
url_list_cache_ttl_minutes = 55
; image/font/media/stylesheet + рекламные домены — меньше трафика прокси
block_heavy_resources = true
; Smartproxy area-XX: подставляется из sources.geo; при сбое — fallback area-GB
proxy_fallback_geo = GB
; Scheduler: quick в :15 каждый час, full каждые 4h (UTC)
quick_scrape_limit = 3
full_scrape_limit = 20
; Пропуск quick, если последний запуск дал 0 новых прогнозов (мин)
scrape_skip_if_empty_minutes = 55
; Окно статистики в админке (дней)
source_stats_days = 7
; Тiers: low — только full scrape; high/medium — участвуют в quick
source_tier_high = vseprosport_ru,stavkiprognozy_ru
source_tier_medium = legalbet_ru,metaratings_ru,betonmobile_ru,legalbet
source_tier_low = beturi,pontulzilei

[proxy_sessions]
; scraper_module = session-id из proxies.txt (sticky IP на источник)
legalbet = betiq001
pontulzilei = betiq002
beturi = betiq003
legalbet_ru = betiq004
metaratings_ru = betiq005
vseprosport_ru = betiq006
stavkiprognozy_ru = betiq007
betonmobile_ru = betiq008

[datetime]
; Время kickoff на странице источника интерпретируется в этой IANA-зоне
source_timezone = Europe/Bucharest
; В PostgreSQL и в API matchDate всегда хранится/отдаётся в UTC
storage_timezone = UTC

[ai]
; ID модели в Anthropic API (старая claude-sonnet-4-20250514 снята — 404)
model = claude-sonnet-4-6
; Шаблон промпта (переменные {{team_home}}, {{match_date}}, {{predictions_block}}, …)
prompt_template = prompts/ai_match_summary.txt
analysis_max_chars = 500
; Дневной бюджет USD для панели в админке (0 = не задан)
daily_budget_usd = 5.0
; Мягкий лимит сводок в день (0 = не показывать)
max_summaries_per_day = 0
; Оценка стоимости при отсутствии Admin API (USD за 1M токенов)
input_price_per_mtok = 3.0
output_price_per_mtok = 15.0

[logging]
level = INFO
file = logs/app.log

[telegram]
; Не слать повторный алерт того же типа по источнику чаще чем (ч)
alert_dedup_hours = 24
; Пауза алертов по кнопке Snooze в боте (ч)
alert_snooze_hours = 6
; Утренняя сводка в Telegram (UTC 08:05, после health check)
morning_digest_enabled = true

[api_sync]
; Включить задачи API-Football + The Odds API (ключи в .env)
enabled = true
link_batch_size = 20
; odds_sync_mode: db_matches (только лиги из предстоящих матчей БД) | all_leagues (все 12 лиг)
odds_sync_mode = db_matches
odds_upcoming_days_ahead = 7
odds_skip_finished_hours = 3
; Минимальный интервал между bulk-синками одного sport_key (мин)
odds_min_interval_minutes = 30
; Telegram-алерт при остатке квоты The Odds API ниже порога
api_quota_alert_threshold = 100
; Сколько строк odds отдавать в админке на один рынок
admin_match_odds_limit = 500
; The Odds API bulk /sports/{key}/odds — только базовые рынки
odds_markets = h2h,spreads,totals
; Расширенные рынки — per-event /events/{id}/odds (каждый = отдельный кредит)
odds_event_markets = btts
odds_event_batch_size = 40
; Коэффициенты API-Football (/odds по fixture_id) для связанных матчей
; Пусто = вывести из odds_markets + odds_event_markets (Match Winner, Goals O/U, …)
api_football_odds_markets =
api_football_odds_enabled = true
api_football_odds_days_ahead = 7
api_football_odds_batch_size = 50
; Сколько связанных матчей обновлять competition/round/venue за прогон link
fixture_refresh_limit = 20
