; ============================================================
;  Sports Predictions Aggregator — настройки
; ============================================================

[scraper]
require_proxy = true
headless = true
page_timeout = 60000
viewport_width = 1366
viewport_height = 768
min_delay = 2.0
max_delay = 5.0
max_retries = 3
articles_max_age_days = 7
; Smartproxy area-XX: подставляется из sources.geo; при сбое — fallback area-GB
proxy_fallback_geo = GB

[datetime]
; Время kickoff на странице источника интерпретируется в этой IANA-зоне
source_timezone = Europe/Bucharest
; В PostgreSQL и в API matchDate всегда хранится/отдаётся в UTC
storage_timezone = UTC

[logging]
level = INFO
file = logs/app.log
