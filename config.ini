[scraper]
require_proxy = true
headless = true
page_timeout = 60000
viewport_width = 1366
viewport_height = 768
min_delay = 2.0
max_delay = 5.0
max_retries = 3
articles_max_age_days = 7

[logging]
level = INFO
file = logs/app.log
